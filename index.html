<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Tenergy - RDO Campo</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* ── TOKENS ──────────────────────────────────────────────── */
        :root {
            --verde: #22703f;
            --vermelho: #bc2828;
            --bg: #f5f5f5;
            --surface: #ffffff;
            --text: #333333;
            --border: #cccccc;
            --muted: #555555;
            --row-bg: #fdfdfd;
            --row-border: #eeeeee;
            --radio-bg: #f9f9f9;
            --shadow: rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --surface: #2c2c2c;
            --text: #e0e0e0;
            --border: #444444;
            --muted: #aaaaaa;
            --row-bg: #333333;
            --row-border: #444444;
            --radio-bg: #3a3a3a;
            --shadow: rgba(0,0,0,0.4);
        }

        /* ── BASE ────────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Aptos', Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background: var(--bg);
            color: var(--text);
            transition: background 0.25s, color 0.25s;
        }

        /* ── THEME TOGGLE ────────────────────────────────────────── */
        .theme-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .theme-label {
            font-size: 0.8rem;
            color: var(--muted);
            user-select: none;
        }

        .theme-switch {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }

        .theme-switch input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }

        .slider {
            position: absolute;
            inset: 0;
            background: #ccc;
            border-radius: 24px;
            cursor: pointer;
            transition: background 0.25s;
        }

        .slider::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            top: 3px;
            background: white;
            border-radius: 50%;
            transition: transform 0.25s;
        }

        .theme-switch input:checked + .slider { background: var(--verde); }
        .theme-switch input:checked + .slider::before { transform: translateX(20px); }

        /* ── HEADER COM LOGO ─────────────────────────────────────── */
        .header-card {
            background: var(--surface);
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 2px 4px var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.25s, box-shadow 0.25s;
        }

        .logo-header {
            max-height: 56px;
            width: auto;
            display: block;
            transition: opacity 0.25s;
        }

        /* Controle das logos por tema */
        .logo-clara  { display: block; }
        .logo-escura { display: none;  }

        [data-theme="dark"] .logo-clara  { display: none;  }
        [data-theme="dark"] .logo-escura { display: block; }

        /* ── CARDS ───────────────────────────────────────────────── */
        .card {
            background: var(--surface);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 2px 4px var(--shadow);
            transition: background 0.25s, box-shadow 0.25s;
        }

        h2 {
            color: var(--verde);
            margin-top: 0;
            border-bottom: 2px solid var(--verde);
            padding-bottom: 5px;
            font-size: 1.2rem;
        }

        /* ── FORM ELEMENTS ───────────────────────────────────────── */
        label { font-weight: bold; display: block; margin: 10px 0 5px; }

        input[type="text"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 1rem;
            background: var(--surface);
            color: var(--text);
            transition: background 0.25s, color 0.25s, border-color 0.25s;
        }

        .radio-group { display: flex; flex-direction: column; gap: 8px; margin-top: 5px; }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--radio-bg);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--row-border);
            cursor: pointer;
            transition: background 0.25s;
        }

        .radio-option input { width: 20px; height: 20px; }

        /* ── ACTIVITY MATRIX ─────────────────────────────────────── */
        .matrix-row {
            background: var(--row-bg);
            padding: 10px;
            border-left: 4px solid var(--border); /* borda dinâmica à esquerda */
            border-top: 1px solid var(--row-border);
            border-right: 1px solid var(--row-border);
            border-bottom: 1px solid var(--row-border);
            border-radius: 6px;
            margin-bottom: 10px;
            transition: background 0.25s, border-left-color 0.25s;
        }

        /* Status colors — aplicados via JS na border-left */
        .matrix-row.status-concluida    { border-left-color: #22703f; }
        .matrix-row.status-andamento    { border-left-color: #d97706; }
        .matrix-row.status-nao-iniciada { border-left-color: #9ca3af; }
        .matrix-row.status-interrompida { border-left-color: #bc2828; }

        .matrix-title { font-weight: bold; color: var(--muted); margin-bottom: 5px; }

        /* ── BUTTONS ─────────────────────────────────────────────── */
        .btn {
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-export { background: #007bff; }
        .btn-export:hover { background: #0069d9; }

        .btn-clear {
            background: var(--vermelho);
            font-size: 0.9rem;
            padding: 10px;
            margin-bottom: 15px;
        }
        .btn-clear:hover { background: #9e2020; }

        /* ── MISC ────────────────────────────────────────────────── */
        .required::after { content: " *"; color: red; }
    </style>
</head>
<body>

    <!-- THEME TOGGLE ──────────────────────────────────────── -->
    <div class="theme-bar">
        <span class="theme-label">Modo Escuro</span>
        <label class="theme-switch" aria-label="Alternar tema escuro">
            <input type="checkbox" id="theme-toggle">
            <span class="slider"></span>
        </label>
    </div>

    <!-- HEADER COM LOGO DINÂMICA ──────────────────────────── -->
    <div class="header-card">
        <!-- Logo modo claro (preta) -->
        <img src="logo-preto.png"  alt="Logo Tenergy" class="logo-header logo-clara">
        <!-- Logo modo escuro (branca) -->
        <img src="logo-branca.png" alt="Logo Tenergy" class="logo-header logo-escura">
    </div>

    <button class="btn btn-clear" onclick="limparFormulario()">LIMPAR FORMULÁRIO (Resetar Padrão)</button>

    <!-- 1. IDENTIFICAÇÃO ──────────────────────────────────── -->
    <div class="card">
        <h2>1. IDENTIFICAÇÃO </h2>

        <label class="required" for="local_obra">Local de Obra (Base e Concessão):</label>
        <input type="text" id="local_obra" placeholder="Ex: SAU01" oninput="salvarOffline()">

        <label class="required" for="data_obra">Data da Obra:</label>
        <input type="date" id="data_obra" onchange="salvarOffline()">

        <label class="required" for="operador">Nome do Operador (Preenchendo no campo):</label>
        <input type="text" id="operador" placeholder="Quem está preenchendo o RDO" oninput="salvarOffline()">
    </div>

    <!-- 3. CHECKLIST INICIAL ──────────────────────────────── -->
    <div class="card">
        <h2>3. CHECKLIST INICIAL</h2>

        <label class="required" for="clima">Condições Climáticas:</label>
        <select id="clima" onchange="salvarOffline()">
            <option value="Ensolarado">Ensolarado</option>
            <option value="Nublado">Nublado</option>
            <option value="Chuva">Chuva</option>
            <option value="Instável">Instável</option>
        </select>

        <label class="required">Ferramentas disponíveis e em condições de trabalho?</label>
        <div class="radio-group">
            <label class="radio-option"><input type="radio" name="ferramentas" value="Sim" checked onclick="salvarOffline()"> Sim</label>
            <label class="radio-option"><input type="radio" name="ferramentas" value="Não" onclick="salvarOffline()"> Não</label>
        </div>

        <label class="required">Condições de Segurança Atendidas?</label>
        <div class="radio-group">
            <label class="radio-option"><input type="radio" name="seguranca" value="Sim" checked onclick="salvarOffline()"> Sim</label>
            <label class="radio-option"><input type="radio" name="seguranca" value="Não" onclick="salvarOffline()"> Não</label>
        </div>
    </div>

    <!-- 4.1 STATUS DAS ATIVIDADES ─────────────────────────── -->
    <div class="card">
        <h2>4.1 STATUS DAS ATIVIDADES</h2>
        <div id="container-atividades"></div>
    </div>

    <!-- REGISTRO DE ATIVIDADES ───────────────────────────── -->
    <div class="card">
        <h2>REGISTRO DE ATIVIDADES</h2>

        <label for="ocorrencias">4.2 Ocorrências Registradas:</label>
        <textarea id="ocorrencias" rows="3" oninput="salvarOffline()">Não foram registradas ocorrências no período.</textarea>

        <label for="fora_escopo">4.3 Atividades fora do escopo:</label>
        <textarea id="fora_escopo" rows="3" oninput="salvarOffline()">Sem atividades fora do escopo</textarea>

        <label for="observacoes">4.4 Observações do Operador:</label>
        <textarea id="observacoes" rows="3" oninput="salvarOffline()">Sem observações</textarea>

        <label for="interferencias">4.5 Interferências a serem tratadas pelo Cliente:</label>
        <textarea id="interferencias" rows="3" oninput="salvarOffline()">Nenhuma interferência externa mapeada.</textarea>

        <label class="required" for="previsao">4.6 Atividades previstas para o próximo dia:</label>
        <textarea id="previsao" rows="3" oninput="salvarOffline()"></textarea>
    </div>

    <button class="btn btn-export" onclick="exportarParaGitTenergy()">📥 GERAR ARQUIVO RDO (Fazer Download)</button>

    <!-- ── SCRIPTS ──────────────────────────────────────────────── -->
    <script>
        /* ── Service Worker ──────────────────────────────────────── */
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }

        /* ── Atividades ──────────────────────────────────────────── */
        const atividades = [
            "Mobilização",
            "Abertura e Preparo do solo",
            "Instalação de eletrodutos",
            "Base de concreto/suporte carregadores",
            "Fixação dos carregadores",
            "Conexões elétricas",
            "Configuração e startup",
            "Recomposição do solo"
        ];

        /* Mapeia valor do select → classe CSS de cor */
        const STATUS_CLASSES = {
            "Concluída":    "status-concluida",
            "Em andamento": "status-andamento",
            "Não iniciada": "status-nao-iniciada",
            "Interrompida": "status-interrompida"
        };

        function atualizarCorAtividade(idx) {
            const select = document.getElementById(`ativ_${idx}`);
            const row    = document.getElementById(`row_${idx}`);
            if (!select || !row) return;

            // Remove todas as classes de status antes de aplicar a nova
            Object.values(STATUS_CLASSES).forEach(c => row.classList.remove(c));
            const classe = STATUS_CLASSES[select.value];
            if (classe) row.classList.add(classe);
        }

        const container = document.getElementById('container-atividades');
        atividades.forEach((ativ, index) => {
            container.innerHTML += `
                <div class="matrix-row status-nao-iniciada" id="row_${index}">
                    <div class="matrix-title">${ativ}</div>
                    <select id="ativ_${index}" onchange="atualizarCorAtividade(${index}); salvarOffline()">
                        <option value="Não iniciada">Não iniciada</option>
                        <option value="Em andamento">Em andamento</option>
                        <option value="Concluída">Concluída</option>
                        <option value="Interrompida">Interrompida</option>
                    </select>
                </div>`;
        });

        /* ── Dark Theme ──────────────────────────────────────────── */
        const toggle = document.getElementById('theme-toggle');
        const html   = document.documentElement;

        function aplicarTema(escuro) {
            html.setAttribute('data-theme', escuro ? 'dark' : 'light');
            toggle.checked = escuro;
        }

        aplicarTema(localStorage.getItem('git_tenergy_tema') === 'dark');

        toggle.addEventListener('change', () => {
            const escuro = toggle.checked;
            localStorage.setItem('git_tenergy_tema', escuro ? 'dark' : 'light');
            aplicarTema(escuro);
        });

        /* ── LocalStorage (dados do formulário) ──────────────────── */
        function salvarOffline() {
            const dados = {
                local_obra:     document.getElementById('local_obra').value,
                data_obra:      document.getElementById('data_obra').value,
                operador:       document.getElementById('operador').value,
                clima:          document.getElementById('clima').value,
                ferramentas:    document.querySelector('input[name="ferramentas"]:checked').value,
                seguranca:      document.querySelector('input[name="seguranca"]:checked').value,
                ocorrencias:    document.getElementById('ocorrencias').value,
                fora_escopo:    document.getElementById('fora_escopo').value,
                observacoes:    document.getElementById('observacoes').value,
                interferencias: document.getElementById('interferencias').value,
                previsao:       document.getElementById('previsao').value,
                status_ativ:    atividades.map((_, idx) => document.getElementById(`ativ_${idx}`).value)
            };
            localStorage.setItem('git_tenergy_cache', JSON.stringify(dados));
        }

        /* ── Carrega dados salvos ao abrir ───────────────────────── */
        window.addEventListener('load', () => {
            const raw = localStorage.getItem('git_tenergy_cache');
            if (!raw) return;

            const d = JSON.parse(raw);
            document.getElementById('local_obra').value     = d.local_obra    || '';
            document.getElementById('data_obra').value      = d.data_obra     || '';
            document.getElementById('operador').value       = d.operador      || '';
            document.getElementById('clima').value          = d.clima         || 'Ensolarado';
            document.getElementById('ocorrencias').value    = d.ocorrencias   || 'Não foram registradas ocorrências no período.';
            document.getElementById('fora_escopo').value    = d.fora_escopo   || 'Sem atividades fora do escopo';
            document.getElementById('observacoes').value    = d.observacoes   || 'Sem observações';
            document.getElementById('interferencias').value = d.interferencias || 'Nenhuma interferência externa mapeada.';
            document.getElementById('previsao').value       = d.previsao      || '';

            if (d.ferramentas) {
                const el = document.querySelector(`input[name="ferramentas"][value="${d.ferramentas}"]`);
                if (el) el.checked = true;
            }
            if (d.seguranca) {
                const el = document.querySelector(`input[name="seguranca"][value="${d.seguranca}"]`);
                if (el) el.checked = true;
            }
            if (d.status_ativ) {
                d.status_ativ.forEach((val, idx) => {
                    const el = document.getElementById(`ativ_${idx}`);
                    if (el) {
                        el.value = val;
                        atualizarCorAtividade(idx); // atualiza a cor ao restaurar
                    }
                });
            }
        });

        /* ── Limpar formulário ───────────────────────────────────── */
        function limparFormulario() {
            if (confirm("Tem certeza que deseja limpar todo o formulário e voltar ao padrão?")) {
                localStorage.removeItem('git_tenergy_cache');
                window.location.reload();
            }
        }

        /* ── Exportar CSV ────────────────────────────────────────── */
        function exportarParaGitTenergy() {
            const local    = document.getElementById('local_obra').value.toUpperCase().trim();
            const dataObra = document.getElementById('data_obra').value;
            const op       = document.getElementById('operador').value.trim();
            const prev     = document.getElementById('previsao').value.trim();

            if (!local || !dataObra || !op || !prev) {
                alert("ERRO DE EXPORTAÇÃO: Preencha todos os campos obrigatórios (marcados com *) antes de gerar o arquivo.");
                return;
            }

            const clima   = document.getElementById('clima').value;
            const fer     = document.querySelector('input[name="ferramentas"]:checked').value;
            const seg     = document.querySelector('input[name="seguranca"]:checked').value;
            const ocor    = document.getElementById('ocorrencias').value;
            const foraEsc = document.getElementById('fora_escopo').value;
            const obs     = document.getElementById('observacoes').value;
            const interf  = document.getElementById('interferencias').value;

            const esc = s => `"${s.replace(/"/g, '""').replace(/\n/g, ' ')}"`;

            const csvHeaders = [
                "Data da Obra", "Local da Obra", "Nome do Operador", "Condições Climáticas",
                "Ferramentas disponíveis", "Condições de Segurança", "Ocorrências registradas",
                "Atividades fora do escopo", "Observações do Operador", "Interferências a serem tratadas",
                "Atividades previstas para o próximo dia"
            ];

            const csvValues = [
                dataObra, local, op.replace(/,/g, " "), clima, fer, seg,
                esc(ocor), esc(foraEsc), esc(obs), esc(interf), esc(prev)
            ];

            atividades.forEach((ativ, idx) => {
                csvHeaders.push(`##### ${ativ}`);
                csvValues.push(document.getElementById(`ativ_${idx}`).value);
            });

            const csvContent = csvHeaders.join(",") + "\r\n" + csvValues.join(",") + "\r\n";
            const blob = new Blob(
                [new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent],
                { type: "text/csv;charset=utf-8;" }
            );

            const url  = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `RDO_${local}_${dataObra}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
